<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

  video {
    width: 100vw;
    height: 100vh;
    background: #000;
    display: block;
  }

  /* ── Spinner ── */
  #spinner {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 50;
    transition: opacity 0.4s;
  }
  #spinner.gone { opacity: 0; pointer-events: none; }
  .spin-ring {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: rgba(255,255,255,0.65);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Unmute overlay ── */
  #unmute-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 60;
    cursor: pointer;
  }
  #unmute-overlay.gone { display: none; }
  #unmute-pill {
    background: rgba(10,10,20,0.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 40px;
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    padding: 13px 24px;
    display: flex;
    align-items: center;
    gap: 9px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }

  /* ── Topbar ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px 30px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
    z-index: 40;
    opacity: 1;
    transition: opacity 0.35s;
  }
  #topbar.hidden { opacity: 0; pointer-events: none; }

  #channel-name {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn {
    width: 36px;
    height: 36px;
    font-size: 17px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn:hover { background: rgba(255,255,255,0.26); }
  .btn:active { background: rgba(255,255,255,0.38); }

  #channel-select {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    border: none;
    padding: 6px 10px;
    font-size: 13px;
    border-radius: 8px;
    cursor: pointer;
    max-width: 140px;
  }
  #channel-select option { background: #1a1a2e; color: #fff; }

  /* ── Keyboard hint (bottom-right, fades out) ── */
  #hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    z-index: 40;
    text-align: right;
    line-height: 1.6;
    transition: opacity 0.5s;
    pointer-events: none;
  }
  #hint.gone { opacity: 0; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,10,20,0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 30px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 20px;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── Programminfo-Banner (beim Umschalten, 3 Sek) ── */
  #infobar {
    position: fixed;
    left: 16px;
    bottom: 16px;
    max-width: min(70vw, 460px);
    background: rgba(10,10,20,0.78);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 12px 16px;
    z-index: 200;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #infobar.show { opacity: 1; transform: translateY(0); }
  #infobar .ib-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 2px;
  }
  #infobar .ib-num {
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    background: rgba(255,255,255,0.16);
    border-radius: 7px;
    padding: 1px 8px;
    flex-shrink: 0;
  }
  #infobar .ib-name {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #infobar .ib-prog {
    color: rgba(255,255,255,0.92);
    font-size: 13px;
    font-weight: 500;
    line-height: 1.35;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  #infobar .ib-time {
    color: rgba(255,255,255,0.55);
    font-size: 12px;
    font-weight: 500;
    margin-top: 2px;
  }

  /* ── Lautstärke-Anzeige ── */
  #volbar {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(10,10,20,0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 30px;
    padding: 9px 18px;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #volbar.show { opacity: 1; }
  #volbar .vol-icon { color: #fff; font-size: 15px; }
  #volbar .vol-track {
    width: 130px;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.2);
    overflow: hidden;
  }
  #volbar .vol-fill {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 3px;
    transition: width 0.12s;
  }
  #volbar .vol-pct { color: #fff; font-size: 12px; font-weight: 600; min-width: 34px; text-align: right; }
</style>
</head>
<body>

<div id="spinner"><div class="spin-ring"></div></div>

<div id="unmute-overlay" class="gone">
  <div id="unmute-pill">🔇 Klicken für Ton</div>
</div>

<div id="topbar">
  <span id="channel-name">Lädt…</span>
  <button class="btn" id="prev" title="Vorheriger Sender (←)">‹</button>
  <button class="btn" id="next" title="Nächster Sender (→)">›</button>
  <select id="channel-select"></select>
  <button class="btn" id="mute-btn" title="Ton an/aus (M)">🔊</button>
  <button class="btn" id="sub-btn" title="Untertitel an/aus (U)">UT</button>
</div>

<!-- muted + playsinline = garantiertes Autoplay -->
<video id="video" muted playsinline></video>

<div id="toast"></div>

<div id="infobar">
  <div class="ib-head">
    <span class="ib-num" id="ib-num">1</span>
    <span class="ib-name" id="ib-name">Sender</span>
  </div>
  <div class="ib-prog" id="ib-prog"></div>
  <div class="ib-time" id="ib-time"></div>
</div>

<div id="volbar">
  <span class="vol-icon" id="vol-icon">🔊</span>
  <div class="vol-track"><div class="vol-fill" id="vol-fill"></div></div>
  <span class="vol-pct" id="vol-pct">100%</span>
</div>

<div id="hint">← → &nbsp;Sender &nbsp;·&nbsp; ↑ ↓ Lautstärke &nbsp;·&nbsp; Leertaste Ton &nbsp;·&nbsp; Tab Programminfo &nbsp;·&nbsp; U Untertitel &nbsp;·&nbsp; F Vollbild</div>

<script>
const params        = new URLSearchParams(window.location.search);
const initialStream = params.get("stream");
const video         = document.getElementById("video");
const topbar        = document.getElementById("topbar");
const spinner       = document.getElementById("spinner");
const unmuteOverlay = document.getElementById("unmute-overlay");
const muteBtn       = document.getElementById("mute-btn");
const hint          = document.getElementById("hint");
const select        = document.getElementById("channel-select");
const subBtn        = document.getElementById("sub-btn");
const toast         = document.getElementById("toast");
const infobar       = document.getElementById("infobar");
const volbar        = document.getElementById("volbar");

// Senderliste – wird in der Mac-App von Swift via setChannels() überschrieben.
// Im Browser bleibt diese Hardcode-Liste als Fallback aktiv.
const sender = [
  "https://daserste-live.ard-mcdn.de/daserste/live/hls/de/master.m3u8",
  "https://zdf-hls-18.akamaized.net/hls/live/2016501/de/high/master.m3u8",
  "https://rbb-hls-berlin.akamaized.net/hls/live/2017824/rbb_berlin/master.m3u8",
  "https://artesimulcast.akamaized.net/hls/live/2030993/artelive_de/index.m3u8",
  "https://mcdn-one.ard.de/ardone/hls/master.m3u8",
  "https://w-live2weltcms.akamaized.net/hls/live/2041019/Welt-LivePGM/index.m3u8",
  "https://zdf-hls-16.akamaized.net/hls/live/2016499/de/veryhigh/master.m3u8",
  "https://zdf-hls-17.akamaized.net/hls/live/2016500/de/veryhigh/master.m3u8",
  "https://wdrfs247.akamaized.net/hls/live/681509/wdr_msl4_fs247/index.m3u8",
  "https://zdf-hls-19.akamaized.net/hls/live/2016502/de/veryhigh/master.m3u8",
  "https://zdf-hls-18.akamaized.net/hls/live/2016501/dach/veryhigh/master.m3u8",
  "https://mcdn.br.de/br/fs/ard_alpha/hls/de/master.m3u8",
  "https://kikageohls.akamaized.net/hls/live/2022693/livetvkika_de/master.m3u8",
  "https://tagesschau.akamaized.net/hls/live/2020115/tagesschau/tagesschau_1/master.m3u8",
  "https://brcdn.vo.llnwd.net/br/fs/bfs_sued/hls/de/master.m3u8",
  "https://hrhls.akamaized.net/hls/live/2024525/hrhls/master.m3u8",
  "https://mdrtvsnhls.akamaized.net/hls/live/2016928/mdrtvsn/master.m3u8",
  "https://mcdn.ndr.de/ndr/hls/ndr_fs/ndr_nds/master.m3u8",
  "https://rbhlslive.akamaized.net/hls/live/2020435/rbfs/master.m3u8",
  "https://srfs.akamaized.net/hls/live/689649/srfsgeo/index.m3u8",
  "https://swrbwd-hls.akamaized.net/hls/live/2018672/swrbwd/master.m3u8",
  "https://ndrint.akamaized.net/hls/live/2020766/ndr_int/index.m3u8",
  "https://sdn-global-live-streaming-packager-cache.3qsdn.com/13456/13456_264_live.m3u8",
  "https://sdn-global-live-streaming-packager-cache.3qsdn.com/64733/64733_264_live.m3u8",
  "https://sdn-global-live-streaming-packager-cache.3qsdn.com/65183/65183_264_live.m3u8",
  "https://sdn-global-live-streaming-packager-cache.3qsdn.com/26658/26658_264_live.m3u8"
];

const names = [
  "Das Erste","ZDF","RBB Berlin","Arte","One","Welt","ZDFneo","ZDFinfo","WDR","Phoenix",
  "3sat","ARD Alpha","KiKA","Tagesschau24",
  "BR Fernsehen","HR Fernsehen","MDR Sachsen","NDR NDS","Radio Bremen TV",
  "SR Fernsehen","SWR BW","NDR International",
  "Deluxe Music","Deluxe Dance","Deluxe Rap","Schlager Deluxe"
];

let currentIndex = Math.max(sender.indexOf(initialStream), 0);
let activeHls    = null;
let subtitlesOn  = false;   // Standard: aus (wird von Swift via setSubtitles() gesetzt)
let toastTimer;

// ── Senderliste dynamisch setzen (von Swift injiziert) ──────────────────────
function setChannels(chNames, chUrls) {
  // Arrays in-place ersetzen (kein let/const-Neuzuweisung nötig)
  sender.length = 0; sender.push(...chUrls);
  names.length  = 0; names.push(...chNames);
  // Dropdown neu aufbauen
  while (select.options.length > 0) select.remove(0);
  chNames.forEach((name, idx) => {
    const opt = document.createElement("option");
    opt.value = idx;
    opt.textContent = name;
    if (idx === currentIndex) opt.selected = true;
    select.appendChild(opt);
  });
}

// ── WebView-UI synchronisieren ohne Wiedergabe auszulösen (von Swift) ───────
function updateChannelUI(idx, name) {
  currentIndex = idx;
  document.getElementById("channel-name").textContent = name;
  document.title = name + " · MacTV";
  select.value = idx;
  showInfoBanner(idx);
}

// ── Untertitel-State auf HLS + TextTracks anwenden ───────────────────────────
function applySubtitleState() {
  if (activeHls) {
    if (subtitlesOn && activeHls.subtitleTracks.length > 0) {
      activeHls.subtitleDisplay = true;
      activeHls.subtitleTrack   = 0;
    } else {
      activeHls.subtitleDisplay = false;
      activeHls.subtitleTrack   = -1;
    }
  }
  for (const t of video.textTracks) {
    t.mode = subtitlesOn ? "showing" : "disabled";
  }
}

// ── Untertitel explizit setzen (von Swift nach Seitenload) ───────────────────
function setSubtitles(on) {
  subtitlesOn = on;
  applySubtitleState();
  subBtn.style.opacity = on ? "1" : "0.45";
}

// ── Stummschaltung explizit setzen (von Swift nach Seitenload) ───────────────
function setMuted(on) {
  video.muted = on;
  muteBtn.textContent = on ? "🔇" : "🔊";
  if (!on) unmuteOverlay.classList.add("gone");
}

// Dropdown befüllen (Browser-Initialisierung; in der Mac-App überschreibt setChannels())
names.forEach((name, idx) => {
  const opt = document.createElement("option");
  opt.value = idx;
  opt.textContent = name;
  if (idx === currentIndex) opt.selected = true;
  select.appendChild(opt);
});
select.onchange = () => zapTo(parseInt(select.value, 10));

document.getElementById("prev").onclick = () => zapTo(currentIndex - 1);
document.getElementById("next").onclick = () => zapTo(currentIndex + 1);

// ── Autoplay-Fix ─────────────────────────────────────────────────────────────
function onPlaybackStarted() {
  spinner.classList.add("gone");
  video.muted = false;
  if (video.muted) {
    showUnmute();
  } else {
    muteBtn.textContent = "🔊";
  }
}

function showUnmute() {
  unmuteOverlay.classList.remove("gone");
  muteBtn.textContent = "🔇";
}

function notifyMuteChange(muted) {
  window.webkit?.messageHandlers?.muteChanged?.postMessage(muted);
}

unmuteOverlay.addEventListener("click", () => {
  video.muted = false;
  unmuteOverlay.classList.add("gone");
  muteBtn.textContent = "🔊";
  notifyMuteChange(false);
});

muteBtn.addEventListener("click", toggleMute);

// ── HLS Player ───────────────────────────────────────────────────────────────
function playUrl(url) {
  if (activeHls) { activeHls.destroy(); activeHls = null; }
  spinner.classList.remove("gone");
  unmuteOverlay.classList.add("gone");
  video.muted = true;

  if (Hls.isSupported()) {
    // subtitleDisplay/subtitleTrack verhindern das automatische Aktivieren durch HLS.js
    const hls = new Hls({
      lowLatencyMode:  true,
      subtitleDisplay: subtitlesOn,
      subtitleTrack:   subtitlesOn ? 0 : -1
    });
    activeHls = hls;
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      applySubtitleState(); // State sofort nach Manifest-Parsing setzen
      video.play()
        .then(onPlaybackStarted)
        .catch(() => spinner.classList.add("gone"));
    });
    // Subtitle-State erneut setzen wenn Tracks nachgeladen werden
    hls.on(Hls.Events.SUBTITLE_TRACKS_UPDATED, () => applySubtitleState());
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) spinner.classList.add("gone");
    });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
    video.addEventListener("canplay", onPlaybackStarted, { once: true });
    video.play().catch(() => spinner.classList.add("gone"));
  } else {
    spinner.classList.add("gone");
    alert("HLS wird auf diesem Gerät nicht unterstützt.");
  }
}

// ── Zapping ──────────────────────────────────────────────────────────────────
// In der Mac-App: sendet requestPlay an Swift → Swift löst URL auf (inkl. ZDF-API) und ruft playUrl().
// Im Browser: spielt direkt und behandelt ZDF lokal via loadZdfViaApi().
function zapTo(idx) {
  if (sender.length === 0) return;
  idx = ((idx % sender.length) + sender.length) % sender.length;
  currentIndex = idx;
  document.getElementById("channel-name").textContent = names[idx] || "";
  document.title = (names[idx] || "Sender") + " · MacTV";
  select.value = idx;
  showInfoBanner(idx);

  if (window.webkit?.messageHandlers?.requestPlay) {
    // Mac-App: Swift übernimmt URL-Auflösung und Wiedergabe
    window.webkit.messageHandlers.requestPlay.postMessage(idx);
  } else {
    // Browser: lokal abspielen
    history.replaceState(null, "", "player.html?stream=" + encodeURIComponent(sender[idx]));
    if (names[idx] === "ZDF") {
      loadZdfViaApi();
    } else {
      playUrl(sender[idx]);
    }
  }
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add("show");
  toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
}

// ── Programminfo / EPG ─────────────────────────────────────────────────────────
// EPG-Daten kommen von der offenen Zapp/MediathekView-API (deckt ARD- & ZDF-Sender ab).
// Sender ohne Mapping (z.B. Musiksender) zeigen nur das Sender-Banner ohne Sendung.
const EPG_BASE = "https://api.zapp.mediathekview.de/v1/shows/";

const zappMap = {
  "das erste": "das_erste", "ard": "das_erste",
  "zdf": "zdf",
  "rbb berlin": "rbb_berlin", "rbb": "rbb_berlin",
  "arte": "arte",
  "one": "one",
  "zdfneo": "zdf_neo",
  "zdfinfo": "zdf_info",
  "wdr": "wdr",
  "phoenix": "phoenix",
  "3sat": "dreisat",
  "ard alpha": "ard_alpha", "ard-alpha": "ard_alpha",
  "kika": "kika",
  "tagesschau24": "tagesschau24", "tagesschau 24": "tagesschau24",
  "br fernsehen": "br_sued", "br": "br_sued",
  "hr fernsehen": "hr", "hr": "hr",
  "mdr sachsen": "mdr_sachsen",
  "ndr nds": "ndr_nds", "ndr niedersachsen": "ndr_nds",
  "radio bremen tv": "rb", "radio bremen": "rb",
  "sr fernsehen": "sr", "sr": "sr",
  "swr bw": "swr_bw", "swr baden-württemberg": "swr_bw"
};

const epgCache = {}; // zappKey -> { ts, show }
let epgReqId = 0;    // verhindert, dass veraltete Antworten ein neueres Banner überschreiben

function zappKeyFor(name) {
  return zappMap[(name || "").trim().toLowerCase()] || null;
}

// ── Nativer EPG-Abruf über Swift (umgeht CORS in der Mac-App) ────────────────
// Swift ruft nach dem Abruf applyEpgResult(id, jsonString) auf.
let nativeEpgSeq = 0;
const nativeEpgResolvers = {};
function fetchEpgNative(key) {
  return new Promise(resolve => {
    const id = ++nativeEpgSeq;
    nativeEpgResolvers[id] = resolve;
    window.webkit.messageHandlers.requestEpg.postMessage({ id, key });
    setTimeout(() => {
      if (nativeEpgResolvers[id]) { delete nativeEpgResolvers[id]; resolve(null); }
    }, 6000);
  });
}
function applyEpgResult(id, jsonStr) {
  const resolve = nativeEpgResolvers[id];
  if (!resolve) return;
  delete nativeEpgResolvers[id];
  try { resolve(jsonStr ? JSON.parse(jsonStr) : null); }
  catch (e) { resolve(null); }
}

async function fetchEpg(key) {
  const c = epgCache[key];
  if (c && Date.now() - c.ts < 120000) return c.show; // 2 Min Cache
  let show = null;
  try {
    let j;
    if (window.webkit?.messageHandlers?.requestEpg) {
      j = await fetchEpgNative(key);                 // Mac-App: nativ via Swift
    } else {
      const r = await fetch(EPG_BASE + key);         // Browser: direkter Fetch
      if (!r.ok) throw new Error("HTTP " + r.status);
      j = await r.json();
    }
    show = (j && j.shows && j.shows[0]) || null;
  } catch (e) {
    console.warn("EPG fehlgeschlagen für", key, e);
    show = null;
  }
  epgCache[key] = { ts: Date.now(), show };
  return show;
}

function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return "";
  return d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
}

let infoTimer;
// Zeigt das Programminfo-Banner für 3 Sek. Lädt EPG asynchron nach.
function showInfoBanner(idx) {
  const name = names[idx] || "Sender";
  document.getElementById("ib-num").textContent  = (idx + 1).toString();
  document.getElementById("ib-name").textContent = name;
  const progEl = document.getElementById("ib-prog");
  const timeEl = document.getElementById("ib-time");
  progEl.textContent = "";
  timeEl.textContent = "";

  infobar.classList.add("show");
  clearTimeout(infoTimer);
  infoTimer = setTimeout(() => infobar.classList.remove("show"), 3000);

  const key = zappKeyFor(name);
  const reqId = ++epgReqId;
  if (!key) return; // kein EPG-Mapping → nur Sender-Banner

  fetchEpg(key).then(show => {
    // Nur anwenden, wenn dies noch die aktuell angezeigte Anfrage ist
    if (reqId !== epgReqId || !show) return;
    progEl.textContent = show.title + (show.subtitle ? " – " + show.subtitle : "");
    const start = fmtTime(show.startTime), end = fmtTime(show.endTime);
    timeEl.textContent = start ? (end ? `${start} – ${end}` : start) : "";
  });
}

// ── Lautstärke ─────────────────────────────────────────────────────────────────
let volTimer;
function showVolume() {
  const pct = Math.round(video.volume * 100);
  const muted = video.muted || video.volume === 0;
  document.getElementById("vol-fill").style.width = (muted ? 0 : pct) + "%";
  document.getElementById("vol-pct").textContent  = muted ? "Stumm" : pct + "%";
  document.getElementById("vol-icon").textContent = muted ? "🔇" : (pct === 0 ? "🔈" : "🔊");
  volbar.classList.add("show");
  clearTimeout(volTimer);
  volTimer = setTimeout(() => volbar.classList.remove("show"), 1500);
}

function changeVolume(delta) {
  // Beim Lauterstellen automatisch Stummschaltung aufheben
  if (delta > 0 && video.muted) {
    video.muted = false;
    muteBtn.textContent = "🔊";
    unmuteOverlay.classList.add("gone");
    notifyMuteChange(false);
  }
  video.volume = Math.min(1, Math.max(0, Math.round((video.volume + delta) * 100) / 100));
  showVolume();
}

// ── Stummschaltung (zentral) ───────────────────────────────────────────────────
function toggleMute() {
  video.muted = !video.muted;
  muteBtn.textContent = video.muted ? "🔇" : "🔊";
  if (!video.muted) unmuteOverlay.classList.add("gone");
  notifyMuteChange(video.muted);
  showVolume();
}

// ── Untertitel (Toggle für Button/Tastatur) ───────────────────────────────────
function toggleSubtitles() {
  setSubtitles(!subtitlesOn);
  showToast(subtitlesOn ? "Untertitel ein" : "Untertitel aus");
}

subBtn.style.opacity = subtitlesOn ? "1" : "0.45";
subBtn.addEventListener("click", toggleSubtitles);

// ── Topbar Auto-Hide ──────────────────────────────────────────────────────────
let hideTimer;
function revealTopbar() {
  topbar.classList.remove("hidden");
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => topbar.classList.add("hidden"), 3200);
}
document.addEventListener("mousemove", revealTopbar);
revealTopbar();

// ── Keyboard-Shortcuts ────────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  // Dropdown / Textfelder ihre eigenen Tasten (Pfeile, Leertaste) behalten lassen
  const tag = (e.target && e.target.tagName) || "";
  if (tag === "SELECT" || tag === "INPUT" || tag === "TEXTAREA") return;

  switch (e.key) {
    // Pfeile rauf/runter → Lautstärke
    case "ArrowUp":
      e.preventDefault(); changeVolume(+0.1); break;
    case "ArrowDown":
      e.preventDefault(); changeVolume(-0.1); break;
    // Pfeile links/rechts → Sender wechseln
    case "ArrowRight":
      e.preventDefault(); zapTo(currentIndex + 1); break;
    case "ArrowLeft":
      e.preventDefault(); zapTo(currentIndex - 1); break;
    // Tab → nächster Sender mit Programminfo
    case "Tab":
      e.preventDefault(); zapTo(currentIndex + 1); break;
    // Leertaste → Ton an/aus (preventDefault verhindert Video-Pause/Scroll)
    case " ": case "Spacebar":
      e.preventDefault(); toggleMute(); break;
    case "m": case "M":
      toggleMute(); break;
    case "u": case "U":
      toggleSubtitles(); break;
    case "f": case "F":
      if (!document.fullscreenElement) video.requestFullscreen().catch(() => {});
      else document.exitFullscreen();
      break;
    default:
      if (e.key >= "1" && e.key <= "9") zapTo(parseInt(e.key) - 1);
      else if (e.key === "0") zapTo(9);
  }
});

// ── Hint ausblenden ───────────────────────────────────────────────────────────
setTimeout(() => hint.classList.add("gone"), 5000);

// ── ZDF via API (nur im Browser; Mac-App delegiert an Swift/ZDFLoader.swift) ──
async function loadZdfViaApi() {
  const PLAYER_ID   = "ngplayer_2_4";
  const GRAPHQL_URL = "https://api.zdf.de/graphql";
  const API_TOKEN   = "ahBaeMeekaiy5ohsai4bee4ki6Oopoi5quailieb";
  const canonical   = "zdf-live-beitrag-100";

  try {
    const gqlResp = await fetch(GRAPHQL_URL, {
      method: "POST",
      headers: {
        "api-auth":     "Bearer " + API_TOKEN,
        "content-type": "application/json",
        "origin":       "https://www.zdf.de",
        "referer":      "https://www.zdf.de/"
      },
      body: JSON.stringify({
        operationName: "VideoByCanonical",
        query: "query VideoByCanonical($canonical:String!){videoByCanonical(canonical:$canonical){currentMedia{nodes{ptmdTemplate id}}}}",
        variables: { canonical }
      })
    });
    const gqlJson      = await gqlResp.json();
    const ptmdTemplate = gqlJson?.data?.videoByCanonical?.currentMedia?.nodes?.[0]?.ptmdTemplate;
    if (!ptmdTemplate) throw new Error("kein ptmdTemplate");

    const streamUrl  = "https://api.zdf.de" + ptmdTemplate.replace("{playerId}", PLAYER_ID).trim();
    const metaResp   = await fetch(streamUrl, {
      headers: {
        "Accept":    "application/vnd.de.zdf.v1.0+json;charset=UTF-8",
        "Api-Auth":  "Bearer " + API_TOKEN,
        "Referer":   "https://www.zdf.de/"
      }
    });
    const metaJson = await metaResp.json();

    let hlsUrl = null;
    outer:
    for (const prio of metaJson.priorityList || []) {
      for (const form of prio.formitaeten || []) {
        if (form.type === "h264_aac_ts_http_m3u8_http") {
          for (const qual of form.qualities || []) {
            if (qual.quality === "auto" && qual.audio?.tracks?.[0]?.uri) {
              hlsUrl = qual.audio.tracks[0].uri;
              break outer;
            }
          }
        }
      }
    }
    if (!hlsUrl) throw new Error("keine HLS-URL");
    playUrl(hlsUrl);
  } catch (err) {
    console.warn("ZDF API fehlgeschlagen, probiere direkte URL:", err);
    playUrl(sender[currentIndex]);
  }
}

// ── Start ─────────────────────────────────────────────────────────────────────
document.getElementById("channel-name").textContent = names[currentIndex] || "Sender";
document.title = (names[currentIndex] || "Sender") + " · MacTV";

// Im Browser sofort abspielen. In der Mac-App ruft Swift nach dem Laden
// setChannels() + setSubtitles() + tuneWebView() auf.
if (!window.webkit?.messageHandlers?.requestPlay) {
  if (names[currentIndex] === "ZDF") {
    loadZdfViaApi();
  } else {
    playUrl(initialStream || sender[currentIndex]);
  }
}
